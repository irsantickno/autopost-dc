<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPost DC — IrPremTech</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--bg1:#0a0d16;--bg2:#0f1320;--bg3:#131826;
  --border:#1e2640;--border2:rgba(80,120,255,0.15);
  --cyan:#00d4ff;--cyan2:#00aacc;--purple:#8b5cf6;--purple2:#6d44d0;
  --green:#00ff88;--green2:#00cc6a;--red:#ff3355;--amber:#ffaa00;
  --text:#c8d4f0;--text2:#7a8aaa;--text3:#3a4a6a;
}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

.sidebar{width:300px;min-width:300px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);background:var(--bg2)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 16px rgba(0,212,255,0.25)}
.logo-name{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:.05em;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:.6rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.sidebar-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.sidebar-body::-webkit-scrollbar{width:3px}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.sec-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.lbl{font-size:.72rem;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;margin-top:10px;letter-spacing:.04em}
.lbl:first-of-type{margin-top:0}
.lbl-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;margin-bottom:4px}
.lbl-row .lbl{margin:0}
input,select,textarea{width:100%;padding:8px 10px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;font-size:.82rem;font-family:'Exo 2',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;resize:none}
input::placeholder,textarea::placeholder{color:var(--text3)}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,.1)}
select option{background:var(--bg3)}
textarea{min-height:75px;line-height:1.5}
.row2{display:flex;gap:8px}
.row2>div{flex:1}
.estimate{margin-top:6px;padding:5px 10px;background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.2);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--amber)}
.opt-tag{font-size:.58rem;background:rgba(0,212,255,.1);color:var(--cyan2);padding:1px 6px;border-radius:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.divider{border:none;border-top:1px solid var(--border);margin:2px 0}

.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border:none;border-radius:7px;font-size:.82rem;font-weight:600;font-family:'Exo 2',sans-serif;cursor:pointer;transition:all .2s;width:100%}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.btn:active{transform:translateY(0)}
.btn-cyan{background:linear-gradient(135deg,var(--cyan2),var(--purple2));color:#fff;box-shadow:0 3px 12px rgba(0,212,255,.2)}
.btn-green{background:linear-gradient(135deg,#007744,#00cc6a);color:#fff;box-shadow:0 3px 12px rgba(0,255,136,.2)}
.btn-sm{padding:5px 10px;font-size:.74rem;width:auto;border-radius:6px}
.btn-stop{background:linear-gradient(135deg,#aa1122,#cc2244);color:#fff}
.btn-start{background:linear-gradient(135deg,#007744,#009955);color:#fff}
.btn-del{background:transparent;border:1px solid rgba(255,51,85,.3);color:var(--red);font-family:'Exo 2',sans-serif;cursor:pointer;border-radius:6px;font-size:.74rem;font-weight:600;padding:5px 10px;transition:all .2s}
.btn-del:hover{background:rgba(255,51,85,.1)}
.btn-refresh{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--cyan);padding:2px 8px;border-radius:5px;font-size:.62rem;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.btn-refresh:hover{background:rgba(0,212,255,.16)}

.acct-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.acct-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.78rem;transition:border-color .2s}
.acct-chip:hover{border-color:var(--border2)}
.acct-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'Rajdhani',sans-serif}
.acct-name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-on{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(0,255,136,.1);color:var(--green2);border:1px solid rgba(0,255,136,.2)}
.badge-idle{font-size:.65rem;color:var(--text3)}
.btn-icon{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px 5px;border-radius:5px;font-size:13px;line-height:1;transition:all .2s;flex-shrink:0}
.btn-icon:hover{color:var(--red);background:rgba(255,51,85,.1)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg1);position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.25}
.topbar-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.06em;display:flex;align-items:center;gap:8px}
.topbar-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.task-count{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text2);background:var(--bg3);padding:3px 11px;border-radius:20px;border:1px solid var(--border)}
.board{flex:1;padding:18px;overflow-y:auto}
.board::-webkit-scrollbar{width:4px}
.board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

.card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:15px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;animation:cardIn .25s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);border-color:var(--border2)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.on::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.card.off::before{background:linear-gradient(90deg,var(--red),var(--purple))}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;letter-spacing:.1em;padding:3px 9px;border-radius:20px}
.pill-on{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2)}
.pill-off{background:rgba(255,51,85,.1);color:var(--red);border:1px solid rgba(255,51,85,.2)}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.pill-on .sdot{animation:blink 1.5s infinite}
.card-ch{font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;margin-bottom:9px}
.wh-tag{font-size:.62rem;padding:1px 6px;border-radius:5px;background:rgba(0,212,255,.1);color:var(--cyan);font-family:'JetBrains Mono',monospace;font-weight:600;margin-left:5px}
.card-meta{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.mrow{display:flex;align-items:center;gap:6px;font-size:.73rem;color:var(--text2);font-family:'JetBrains Mono',monospace}
.mrow .mi{font-size:11px;width:13px;text-align:center;flex-shrink:0}
.next-on{color:var(--cyan)}
.next-off{color:var(--text3)}
.jbadge{font-size:.58rem;font-weight:600;padding:1px 6px;border-radius:8px;background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.15)}
.card-msg{background:var(--bg2);border-left:2px solid var(--border2);border-radius:0 6px 6px 0;padding:7px 10px;font-size:.76rem;color:var(--text2);margin-bottom:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.card-actions{display:flex;gap:7px;align-items:center}

.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;gap:10px;color:var(--text3);text-align:center}
.empty-ico{font-size:44px;opacity:.25}
.empty-txt{font-size:.82rem;line-height:1.5;max-width:200px}

#toasts{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:9px 15px;font-size:.78rem;font-weight:500;color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,.5);animation:tIn .25s ease;display:flex;align-items:center;gap:8px;max-width:280px}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--cyan)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spinning .7s linear infinite;display:none}
.spin.on{display:block}
@keyframes spinning{to{transform:rotate(360deg)}}

@media(max-width:620px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .3s;z-index:50;width:285px}
  .sidebar.open{transform:translateX(0)}
  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:49}
  .sidebar.open ~ .mob-overlay{display:block}
  .mbtn{display:flex!important}
}
.mbtn{display:none;background:none;border:none;color:var(--text);cursor:pointer;font-size:18px;padding:4px;margin-right:6px}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-name">AutoPost DC</div>
        <div class="logo-sub">IrPremTech v1.0</div>
      </div>
    </div>
  </div>
  <div class="sidebar-body">

    <!-- ACCOUNTS -->
    <div>
      <div class="sec-label">🔑 Accounts</div>
      <span class="lbl">User Token</span>
      <input id="inp-token" type="password" placeholder="Paste Discord token…">
      <div style="margin-top:8px">
        <button class="btn btn-cyan" id="btn-add-acct" onclick="addAccount()">
          <div class="spin" id="spin-login"></div>
          <span id="txt-login">+ Add Account</span>
        </button>
      </div>
      <div class="acct-list" id="acct-list">
        <p style="font-size:.72rem;color:var(--text3);margin-top:4px">Belum ada akun.</p>
      </div>
    </div>

    <div class="divider"></div>

    <!-- NEW TASK -->
    <div>
      <div class="sec-label">📝 New Task</div>

      <span class="lbl">Account</span>
      <select id="sel-acct" onchange="loadChannels()">
        <option value="">— pilih akun —</option>
      </select>

      <div class="lbl-row">
        <span class="lbl">Channel</span>
        <button class="btn-refresh" onclick="loadChannels()">↻ refresh</button>
      </div>
      <select id="sel-ch">
        <option value="">— pilih akun dulu —</option>
      </select>

      <div class="row2">
        <div>
          <span class="lbl">Interval (menit)</span>
          <input id="inp-interval" type="number" min="1" value="10" oninput="updateEst()">
        </div>
        <div>
          <span class="lbl">Jitter (%)</span>
          <input id="inp-jitter" type="number" min="0" max="90" value="30" oninput="updateEst()">
        </div>
      </div>
      <div class="estimate" id="estimate">⌛ Estimasi: 7.0 – 13.0 menit</div>

      <span class="lbl">Message</span>
      <textarea id="inp-msg" placeholder="Tulis pesan yang akan dikirim…"></textarea>

      <div class="lbl-row">
        <span class="lbl">Webhook URL</span>
        <span class="opt-tag">opsional</span>
      </div>
      <input id="inp-webhook" type="url" placeholder="https://discord.com/api/webhooks/…">

      <div style="margin-top:12px">
        <button class="btn btn-green" id="btn-add-task" onclick="createTask()">+ Add to Kanban</button>
      </div>
    </div>

  </div>
</div>

<div class="mob-overlay" onclick="closeSidebar()"></div>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <button class="mbtn" onclick="openSidebar()">☰</button>
      <div class="topbar-title">
        <div class="topbar-dot"></div>
        Automation Kanban
      </div>
    </div>
    <span class="task-count" id="task-count">0 tasks</span>
  </div>
  <div class="board">
    <div class="grid" id="kanban"></div>
  </div>
</div>

<div id="toasts"></div>

<script>
// ───────────────────────────────────────────
//  STATE  (wrapped in try-catch jaga-jaga)
// ───────────────────────────────────────────
let accounts = [], tasks = [], timers = {};
try { accounts = JSON.parse(localStorage.getItem('dc_accounts') || '[]'); } catch(e) {}
try { tasks    = JSON.parse(localStorage.getItem('dc_tasks')    || '[]'); } catch(e) {}

function save() {
  localStorage.setItem('dc_accounts', JSON.stringify(accounts));
  localStorage.setItem('dc_tasks',    JSON.stringify(tasks));
}

// ───────────────────────────────────────────
//  UTILS
// ───────────────────────────────────────────
function toast(msg, type) {
  type = type || 'ok';
  var wrap = document.getElementById('toasts');
  var el   = document.createElement('div');
  el.className = 'toast ' + type;
  var ico  = {ok:'✅', err:'❌', info:'💠'}[type] || '💠';
  el.innerHTML = '<span>' + ico + '</span><span>' + msg + '</span>';
  wrap.appendChild(el);
  setTimeout(function(){ el.remove(); }, 3500);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(ms) {
  if (!ms) return '—';
  return new Date(ms).toTimeString().slice(0,8);
}

function updateEst() {
  var iv = parseFloat(document.getElementById('inp-interval').value) || 10;
  var jt = parseFloat(document.getElementById('inp-jitter').value)   || 30;
  document.getElementById('estimate').textContent =
    '⌛ Estimasi: ' + (iv*(1-jt/100)).toFixed(1) + ' – ' + (iv*(1+jt/100)).toFixed(1) + ' menit';
}

function getDelay(task) {
  var base = task.interval * 60 * 1000;
  var j    = base * (task.jitter / 100);
  return base - j + Math.random() * j * 2;
}

// ───────────────────────────────────────────
//  DISCORD API — via Vercel proxy
// ───────────────────────────────────────────
function dcFetch(path, token, method, body) {
  method = method || 'GET';
  var opts = {
    method: method,
    headers: {
      'Content-Type':    'application/json',
      'X-Discord-Token': token
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch('/api/discord/' + path, opts).then(function(r) {
    if (!r.ok) return r.text().then(function(t){ throw new Error('HTTP ' + r.status + ': ' + t.slice(0,60)); });
    return r.json();
  });
}

function webhookPost(url, content) {
  return fetch(url, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ content: content })
  }).then(function(r){ return r.ok; });
}

// ───────────────────────────────────────────
//  ACCOUNTS
// ───────────────────────────────────────────
function addAccount() {
  var token = document.getElementById('inp-token').value.trim();
  if (!token) { toast('Token tidak boleh kosong', 'err'); return; }

  var spin = document.getElementById('spin-login');
  var txt  = document.getElementById('txt-login');
  spin.classList.add('on');
  txt.textContent = 'Connecting…';
  document.getElementById('inp-token').value = '';

  dcFetch('users/@me', token).then(function(me) {
    if (!me.id) throw new Error('invalid token');
    var tag = me.username + (me.discriminator && me.discriminator !== '0' ? '#'+me.discriminator : '');
    if (accounts.find(function(a){ return a.token === token; })) {
      toast('Akun sudah ada', 'info');
    } else {
      accounts.push({ token: token, tag: tag, id: me.id });
      save();
      toast('Login: ' + tag, 'ok');
    }
    renderAccounts();
    document.getElementById('sel-acct').value = token;
    loadChannels();
  }).catch(function(e) {
    toast('Gagal: ' + e.message, 'err');
  }).finally(function() {
    spin.classList.remove('on');
    txt.textContent = '+ Add Account';
  });
}

function renderAccounts() {
  var list = document.getElementById('acct-list');
  var sel  = document.getElementById('sel-acct');

  if (!accounts.length) {
    list.innerHTML = '<p style="font-size:.72rem;color:var(--text3);margin-top:4px">Belum ada akun.</p>';
    sel.innerHTML  = '<option value="">— pilih akun —</option>';
    return;
  }

  var active = {};
  tasks.filter(function(t){ return t.status === 'on'; }).forEach(function(t){
    active[t.token] = (active[t.token] || 0) + 1;
  });

  list.innerHTML = accounts.map(function(a) {
    return '<div class="acct-chip">' +
      '<div class="acct-av">' + esc(a.tag[0].toUpperCase()) + '</div>' +
      '<span class="acct-name" title="' + esc(a.tag) + '">' + esc(a.tag) + '</span>' +
      (active[a.token]
        ? '<span class="badge-on">' + active[a.token] + ' aktif</span>'
        : '<span class="badge-idle">idle</span>') +
      '<button class="btn-icon" onclick="delAccount(this)" data-token="' + esc(a.token) + '" title="Hapus">🗑</button>' +
      '</div>';
  }).join('');

  var prev = sel.value;
  sel.innerHTML = accounts.map(function(a){
    return '<option value="' + esc(a.token) + '">' + esc(a.tag) + '</option>';
  }).join('');
  if (accounts.find(function(a){ return a.token === prev; })) sel.value = prev;
}

function delAccount(btn) {
  var token = btn.getAttribute('data-token');
  if (!confirm('Hapus akun ini? Task terkait juga dihapus.')) return;
  tasks.filter(function(t){ return t.token === token; }).forEach(function(t){ stopTimer(t.id); });
  tasks    = tasks.filter(function(t){ return t.token !== token; });
  accounts = accounts.filter(function(a){ return a.token !== token; });
  save(); renderAccounts(); renderKanban();
  toast('Akun dihapus', 'err');
}

// ───────────────────────────────────────────
//  CHANNELS
// ───────────────────────────────────────────
function loadChannels() {
  var token = document.getElementById('sel-acct').value;
  var sel   = document.getElementById('sel-ch');
  if (!token) {
    sel.innerHTML = '<option value="">— pilih akun dulu —</option>';
    return;
  }
  sel.innerHTML = '<option disabled selected>⏳ Loading…</option>';

  dcFetch('users/@me/guilds', token).then(function(guilds) {
    if (!Array.isArray(guilds)) throw new Error('response bukan array');

    var promises = guilds.slice(0, 25).map(function(g) {
      return dcFetch('guilds/' + g.id + '/channels', token).then(function(list) {
        if (!Array.isArray(list)) return [];
        return list
          .filter(function(c){ return c.type === 0; })
          .map(function(c){ return { id: c.id, name: c.name, guild: g.name }; });
      }).catch(function(){ return []; });
    });

    return Promise.all(promises).then(function(results) {
      var channels = [].concat.apply([], results);
      if (!channels.length) throw new Error('tidak ada channel text');
      sel.innerHTML = channels.map(function(c){
        return '<option value="' + esc(c.id) + '">[' + esc(c.guild) + '] #' + esc(c.name) + '</option>';
      }).join('');
      toast(channels.length + ' channel loaded', 'info');
    });
  }).catch(function(e) {
    sel.innerHTML = '<option value="__manual__">— Masukkan Channel ID manual —</option>';
    toast('Gagal load channel: ' + e.message, 'err');
  });
}

// ───────────────────────────────────────────
//  TASKS
// ───────────────────────────────────────────
function createTask() {
  var token    = document.getElementById('sel-acct').value;
  var msg      = document.getElementById('inp-msg').value.trim();
  var interval = parseInt(document.getElementById('inp-interval').value) || 10;
  var jitter   = parseInt(document.getElementById('inp-jitter').value)   || 30;
  var webhook  = document.getElementById('inp-webhook').value.trim();
  var chSel    = document.getElementById('sel-ch');
  var chId     = chSel.value;
  var chName   = chSel.options[chSel.selectedIndex] ? chSel.options[chSel.selectedIndex].text : chId;

  if (!token) { toast('Pilih akun dulu', 'err'); return; }
  if (!msg)   { toast('Pesan tidak boleh kosong', 'err'); return; }

  if (chId === '__manual__' || !chId) {
    chId = (prompt('Masukkan Channel ID:') || '').trim();
    if (!chId) return;
    chName = '#' + chId;
  }
  if (!chId && !webhook) { toast('Pilih channel atau isi webhook URL', 'err'); return; }

  var acct = accounts.find(function(a){ return a.token === token; });
  var task = {
    id:       String(Date.now()),
    token:    token,
    acctTag:  acct ? acct.tag : '?',
    chId:     chId,
    chName:   chName,
    webhook:  webhook,
    msg:      msg,
    interval: interval,
    jitter:   jitter,
    status:   'on',
    lastRun:  null,
    nextRun:  null,
  };

  tasks.push(task);
  save();
  startTimer(task.id);
  renderKanban();
  renderAccounts();
  document.getElementById('inp-msg').value     = '';
  document.getElementById('inp-webhook').value = '';
  toast('Task ditambahkan!', 'ok');
}

// ───────────────────────────────────────────
//  TIMER — check every 10s like autopost.js
// ───────────────────────────────────────────
function startTimer(taskId) {
  var task = tasks.find(function(t){ return t.id === taskId; });
  if (!task) return;
  task.status  = 'on';
  task.nextRun = Date.now() + getDelay(task);
  save();

  timers[taskId] = setInterval(function() {
    var t = tasks.find(function(x){ return x.id === taskId; });
    if (!t || t.status !== 'on') { clearInterval(timers[taskId]); return; }
    if (Date.now() < t.nextRun) return;

    var postPromise;
    if (t.webhook) {
      postPromise = webhookPost(t.webhook, t.msg);
    } else {
      postPromise = dcFetch('channels/' + t.chId + '/messages', t.token, 'POST', { content: t.msg })
        .then(function(){ return true; });
    }

    postPromise.catch(function(e){
      toast('Post gagal: ' + t.chName, 'err');
      return false;
    }).then(function(){
      t.lastRun = Date.now();
      t.nextRun = Date.now() + getDelay(t);
      save();
      renderKanban();
      renderAccounts();
    });
  }, 10000);
}

function stopTimer(taskId) {
  clearInterval(timers[taskId]);
  delete timers[taskId];
  var t = tasks.find(function(x){ return x.id === taskId; });
  if (t) { t.status = 'off'; t.nextRun = null; save(); }
}

function toggleTask(btn) {
  var taskId = btn.getAttribute('data-id');
  var t = tasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  if (t.status === 'on') {
    stopTimer(taskId);
    toast('Task dihentikan ⏹', 'info');
  } else {
    startTimer(taskId);
    toast('Task dijalankan ▶', 'ok');
  }
  renderKanban();
  renderAccounts();
}

function deleteTask(btn) {
  var taskId = btn.getAttribute('data-id');
  if (!confirm('Hapus task ini?')) return;
  stopTimer(taskId);
  tasks = tasks.filter(function(t){ return t.id !== taskId; });
  save();
  renderKanban();
  renderAccounts();
  toast('Task dihapus', 'err');
}

// ───────────────────────────────────────────
//  KANBAN
// ───────────────────────────────────────────
function renderKanban() {
  var board = document.getElementById('kanban');
  document.getElementById('task-count').textContent =
    tasks.length + ' task' + (tasks.length !== 1 ? 's' : '');

  if (!tasks.length) {
    board.innerHTML =
      '<div class="empty"><div class="empty-ico">📭</div>' +
      '<p class="empty-txt">Belum ada task.<br>Tambah dari sidebar kiri.</p></div>';
    return;
  }

  board.innerHTML = tasks.map(function(t) {
    var isOn = t.status === 'on';
    return '<div class="card ' + t.status + '" id="card-' + t.id + '">' +
      '<div class="card-top">' +
        '<div class="status-pill ' + (isOn ? 'pill-on' : 'pill-off') + '">' +
          '<span class="sdot"></span>' + (isOn ? 'ON' : 'OFF') +
        '</div>' +
        '<span style="font-size:17px">💬</span>' +
      '</div>' +
      '<div class="card-ch">' + esc(t.chName) +
        (t.webhook ? '<span class="wh-tag">WH</span>' : '') +
      '</div>' +
      '<div class="card-meta">' +
        '<div class="mrow"><span class="mi">⏱</span>~' + t.interval + 'm ' +
          '<span class="jbadge">±' + t.jitter + '% jitter</span></div>' +
        '<div class="mrow"><span class="mi">🕐</span>Last: ' + fmt(t.lastRun) + '</div>' +
        '<div class="mrow"><span class="mi">⏭</span>Next: ' +
          '<span class="' + (isOn ? 'next-on' : 'next-off') + '" id="nxt-' + t.id + '">' +
            (t.nextRun && isOn ? fmt(t.nextRun) : '—') +
          '</span></div>' +
        '<div class="mrow"><span class="mi">👤</span>' + esc(t.acctTag) + '</div>' +
      '</div>' +
      '<div class="card-msg" title="' + esc(t.msg) + '">&ldquo;' + esc(t.msg) + '&rdquo;</div>' +
      '<div class="card-actions">' +
        '<button class="btn btn-sm ' + (isOn ? 'btn-stop' : 'btn-start') +
          '" onclick="toggleTask(this)" data-id="' + t.id + '">' +
          (isOn ? '⏹ Stop' : '▶ Start') +
        '</button>' +
        '<button class="btn-del" onclick="deleteTask(this)" data-id="' + t.id + '">🗑 Delete</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ───────────────────────────────────────────
//  MOBILE SIDEBAR
// ───────────────────────────────────────────
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

// ───────────────────────────────────────────
//  LIVE CLOCK — update next run every 5s
// ───────────────────────────────────────────
setInterval(function() {
  tasks.forEach(function(t) {
    if (t.status !== 'on' || !t.nextRun) return;
    var el = document.getElementById('nxt-' + t.id);
    if (el) el.textContent = fmt(t.nextRun);
  });
}, 5000);

// ───────────────────────────────────────────
//  INIT
// ───────────────────────────────────────────
renderAccounts();
renderKanban();
updateEst();

// Restore running tasks
tasks.forEach(function(t) {
  if (t.status === 'on') {
    t.nextRun = Date.now() + getDelay(t);
    startTimer(t.id);
  }
});

// Auto-load channels for first account
if (accounts.length) {
  document.getElementById('sel-acct').value = accounts[0].token;
  loadChannels();
}
</script>
</body>
</html>
